name: 'looking-glass / review'
description: 'Capture screenshots, generate captions and critique, post the PR comment.'

inputs:
  base-url:
    required: true
    description: 'Base URL to visit.'
  routes:
    required: true
    description: 'JSON array of routes.'
  viewports:
    required: false
    description: 'JSON array of viewports.'
    default: '[{"name":"desktop","width":1440,"height":900},{"name":"mobile","width":390,"height":844}]'
  rubric-path:
    required: false
    description: 'Rubric file path.'
    default: 'design-rubric.yml'
  captions:
    required: false
    description: 'Run caption job.'
    default: 'true'
  critique:
    required: false
    description: 'Run critique job.'
    default: 'true'
  model:
    required: false
    description: 'LLM model id.'
    default: ''
  pr-comment:
    required: false
    description: 'Post PR comment.'
    default: 'true'
  gh-token:
    required: true
    description: 'GITHUB_TOKEN.'

outputs:
  artefact-path:
    description: 'Absolute path to artefact.'
    value: ${{ steps.render.outputs.artefact-path }}
  summary:
    description: 'Summary string.'
    value: ${{ steps.render.outputs.summary }}
  status:
    description: 'ok | partial | error'
    value: ${{ steps.render.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: 'Install action deps'
      shell: bash
      working-directory: ${{ github.action_path }}/../..
      run: |
        set -e
        if [ ! -d node_modules ]; then
          npm ci --omit=dev || npm install --omit=dev
        fi

    - name: 'Install Playwright chromium'
      shell: bash
      run: |
        set -e
        npm install --no-save playwright@latest
        npx playwright install --with-deps chromium

    - name: 'Capture screenshots'
      id: capture
      shell: bash
      continue-on-error: true
      env:
        LG_BASE_URL: ${{ inputs.base-url }}
        LG_ROUTES_JSON: ${{ inputs.routes }}
        LG_VIEWPORTS_JSON: ${{ inputs.viewports }}
        LG_OUT_DIR: ${{ github.workspace }}/out
      run: node ${{ github.action_path }}/../../src/capture.mjs

    - name: 'Captions'
      if: ${{ inputs.captions == 'true' }}
      shell: bash
      continue-on-error: true
      env:
        LG_OUT_DIR: ${{ github.workspace }}/out
        LG_MODEL: ${{ inputs.model }}
        GITHUB_TOKEN: ${{ inputs.gh-token }}
      run: node ${{ github.action_path }}/../../src/caption.mjs

    - name: 'Critique'
      if: ${{ inputs.critique == 'true' }}
      shell: bash
      continue-on-error: true
      env:
        LG_OUT_DIR: ${{ github.workspace }}/out
        LG_MODEL: ${{ inputs.model }}
        LG_RUBRIC_PATH: ${{ inputs.rubric-path }}
        LG_PR_TITLE: ${{ github.event.pull_request.title }}
        GITHUB_TOKEN: ${{ inputs.gh-token }}
      run: node ${{ github.action_path }}/../../src/critique.mjs

    - name: 'Render markdown'
      id: render
      shell: bash
      continue-on-error: true
      env:
        LG_OUT_DIR: ${{ github.workspace }}/out
        LG_PR_TITLE: ${{ github.event.pull_request.title }}
        LG_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: node ${{ github.action_path }}/../../src/render-markdown.mjs

    - name: 'Upload artefact'
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: looking-glass
        path: ${{ github.workspace }}/out
        if-no-files-found: warn

    - name: 'PR comment'
      if: ${{ inputs.pr-comment == 'true' && github.event.pull_request.number != '' }}
      shell: bash
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ inputs.gh-token }}
        LG_OUT_DIR: ${{ github.workspace }}/out
        LG_PR_NUMBER: ${{ github.event.pull_request.number }}
        LG_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: node ${{ github.action_path }}/../../src/comment.mjs
